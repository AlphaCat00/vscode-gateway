<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OpenVSCode Gateway{% endblock %}</title>
    <link rel="stylesheet" href="/static/app.css">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:;">
</head>
<body>
    <header>
        <h1><a href="/">OpenVSCode Gateway</a></h1>
        <nav>
            <a href="/">Dashboard</a>
            <a href="/settings/ssh">SSH Config</a>
            <a href="/settings/keys">SSH Keys</a>
        </nav>
        <form action="/logout" method="post" class="logout-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <button type="submit">Logout</button>
        </form>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <small>OpenVSCode SSH Gateway</small>
    </footer>
</body>
</html>
